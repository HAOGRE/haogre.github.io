<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="'Comic Sans MS','PingFang SC','Microsoft YaHei',cursive">
  <rect width="1280" height="720" fill="#ffffff"/>
  <!-- 三位数字 3 5 2，各站在一个小台子上，底下漏出"1"珠子 -->
  <g font-size="56" text-anchor="middle" fill="#111" font-weight="bold">
    <text x="300" y="180">3</text>
    <text x="560" y="180">5</text>
    <text x="820" y="180">2</text>
  </g>
  <!-- 数字下面的台子 -->
  <g fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round">
    <path d="M 270 200 L 330 200 L 330 240 L 270 240 Z"/>
    <path d="M 530 200 L 590 200 L 590 240 L 530 240 Z"/>
    <path d="M 790 200 L 850 200 L 850 240 L 790 240 Z"/>
  </g>
  <!-- 偷带的"1"零头珠子，从台子底下掉出 -->
  <g>
    <circle cx="300" cy="290" r="22" fill="none" stroke="#c53030" stroke-width="3"/>
    <text x="300" y="299" fill="#c53030" font-size="26" text-anchor="middle" font-weight="bold">1</text>
    <circle cx="560" cy="290" r="22" fill="none" stroke="#c53030" stroke-width="3"/>
    <text x="560" y="299" fill="#c53030" font-size="26" text-anchor="middle" font-weight="bold">1</text>
    <circle cx="820" cy="290" r="22" fill="none" stroke="#c53030" stroke-width="3"/>
    <text x="820" y="299" fill="#c53030" font-size="26" text-anchor="middle" font-weight="bold">1</text>
  </g>
  <!-- 漏斗轨道，把珠子引向中间的筐 -->
  <g stroke="#dd6b20" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 300 315 Q 300 380 560 460"/>
    <path d="M 820 315 Q 820 380 560 460"/>
    <path d="M 560 315 L 560 460"/>
  </g>
  <!-- 筐：数字和 -->
  <g fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round">
    <path d="M 470 460 L 650 460 L 625 560 L 495 560 Z"/>
  </g>
  <text x="560" y="520" fill="#111" font-size="34" text-anchor="middle" font-weight="bold">3+5+2</text>
  <!-- 筐标签 -->
  <g fill="#2b6cb0" font-size="30" font-style="italic" text-anchor="middle">
    <text x="560" y="600">数字和</text>
  </g>
  <!-- 小黑：收银员姿态，在筐旁接珠子 -->
  <g>
    <ellipse cx="780" cy="470" rx="40" ry="48" fill="#111"/>
    <circle cx="768" cy="463" r="5" fill="#fff"/>
    <circle cx="792" cy="463" r="5" fill="#fff"/>
    <path d="M 768 518 L 762 550 M 792 518 L 798 550" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- 手伸向珠子和筐 -->
    <path d="M 742 470 L 700 430 M 742 490 L 660 490" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  <!-- 批注 -->
  <g fill="#c53030" font-size="28" font-style="italic">
    <text x="130" y="640">每位都偷带一个 1 的零头</text>
  </g>
  <g fill="#dd6b20" font-size="28" font-style="italic">
    <text x="130" y="685">收集起来 = 各位数字之和</text>
  </g>
</svg>
