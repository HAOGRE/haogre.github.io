<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="'Comic Sans MS','PingFang SC','Microsoft YaHei',cursive">
  <rect width="1280" height="720" fill="#ffffff"/>
  <!-- 除法器：一个怪诞漏斗箱子 -->
  <g fill="none" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 漏斗主体 -->
    <path d="M 540 360 L 740 360 L 700 470 L 580 470 Z"/>
    <!-- 箱身 -->
    <path d="M 580 470 L 700 470 L 700 560 L 580 560 Z"/>
    <!-- ÷3 标在箱身上 -->
  </g>
  <text x="640" y="525" fill="#dd6b20" font-size="40" text-anchor="middle" font-weight="bold">÷3</text>
  <!-- 入口：三个台阶数 10 100 1000 从上方投入 -->
  <g fill="#111" font-size="34" text-anchor="middle">
    <text x="430" y="200">1000</text>
    <text x="560" y="200">100</text>
    <text x="690" y="200">10</text>
  </g>
  <!-- 投入的箭头 -->
  <g stroke="#111" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 430 215 L 580 355" marker-end="url(#ar2)"/>
    <path d="M 560 215 L 615 355" marker-end="url(#ar2)"/>
    <path d="M 690 215 L 660 355" marker-end="url(#ar2)"/>
  </g>
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#111"/>
    </marker>
  </defs>
  <!-- 出口：掉出来的全是"1"珠子 红色 -->
  <g>
    <circle cx="610" cy="600" r="26" fill="none" stroke="#c53030" stroke-width="3"/>
    <text x="610" y="610" fill="#c53030" font-size="30" text-anchor="middle" font-weight="bold">1</text>
    <circle cx="660" cy="640" r="26" fill="none" stroke="#c53030" stroke-width="3"/>
    <text x="660" y="650" fill="#c53030" font-size="30" text-anchor="middle" font-weight="bold">1</text>
    <circle cx="560" cy="650" r="26" fill="none" stroke="#c53030" stroke-width="3"/>
    <text x="560" y="660" fill="#c53030" font-size="30" text-anchor="middle" font-weight="bold">1</text>
  </g>
  <!-- 小黑：在出口下方接珠子，惊讶 -->
  <g>
    <ellipse cx="780" cy="600" rx="40" ry="48" fill="#111"/>
    <circle cx="768" cy="593" r="5" fill="#fff"/>
    <circle cx="792" cy="593" r="5" fill="#fff"/>
    <!-- 惊讶：圆眼已是大眼，加惊叹号 -->
    <path d="M 778 560 L 778 540 M 778 532 L 778 528" stroke="#c53030" stroke-width="4" stroke-linecap="round"/>
    <path d="M 768 648 L 762 680 M 792 648 L 798 680" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- 手指向珠子 -->
    <path d="M 742 600 L 700 620" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  <!-- 批注 -->
  <g fill="#c53030" font-size="30" font-style="italic">
    <text x="120" y="180">1、10、100、1000</text>
    <text x="120" y="220">除以 3……</text>
  </g>
  <g fill="#2b6cb0" font-size="30" font-style="italic">
    <text x="120" y="460">余数</text>
    <text x="120" y="500">全是 1！</text>
  </g>
  <g fill="#111" font-size="24" font-style="italic">
    <text x="430" y="685">这就是全部秘密</text>
  </g>
</svg>
